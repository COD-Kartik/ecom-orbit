{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-Com Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f8fafc;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --primary-dark: #3730a3;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.02), 0 4px 6px -1px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', system-ui, sans-serif;
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--border-color);
        }
        .icon-box {
            width: 60px; height: 60px;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .icon-box svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 1.8; }
        .title { font-size: 1.35rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
        .desc { font-size: 0.86rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }
        .message-banner {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; background-color: var(--danger-light); color: var(--danger);
        }
        .form-label {
            display: block; font-size: 0.8rem; font-weight: 700; color: #334155;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-input {
            width: 100%; padding: 12px 16px; border: 1.5px solid var(--border-color);
            border-radius: var(--radius-sm); background: var(--bg-main); color: var(--text-dark);
            font-size: 0.92rem; margin-bottom: 20px; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: #fff; }
        .btn-primary {
            width: 100%; background: var(--primary); color: #ffffff; border: none;
            padding: 13px; border-radius: var(--radius-sm); font-size: 0.92rem; font-weight: 700;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .back-link { margin-top: 20px; text-align: center; font-size: 0.85rem; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
            </svg>
        </div>
        <h2 class="title">Forgot your password?</h2>
        <p class="desc">Enter the email associated with your account and we'll send you a 6-digit code to reset your password.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="message-banner">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label class="form-label" for="fp-email">Email Address</label>
            <input type="email" name="email" id="fp-email" class="form-input" placeholder="you@business.com" required>
            <button type="submit" class="btn-primary">Send Reset Code</button>
        </form>

        <div class="back-link">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>
</body>
</html>
