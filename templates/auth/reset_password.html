{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - E-Com Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #f8fafc;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --primary-dark: #3730a3;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --success-light: #ecfdf5;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.02), 0 4px 6px -1px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', 'Outfit', system-ui, sans-serif;
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .icon-box {
            width: 60px; height: 60px;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-box svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 1.8; }
        .title { font-size: 1.35rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
        .desc { font-size: 0.86rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }
        .message-banner {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; text-align: left;
        }
        .message-banner.error { background-color: var(--danger-light); color: var(--danger); }
        .message-banner.success { background-color: var(--success-light); color: var(--success); }

        .code-input-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .code-digit-input {
            width: 44px; height: 52px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-main);
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
        }
        .code-digit-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: #fff; }

        .form-label {
            display: block; font-size: 0.8rem; font-weight: 700; color: #334155;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left;
        }
        .form-input {
            width: 100%; padding: 12px 16px; border: 1.5px solid var(--border-color);
            border-radius: var(--radius-sm); background: var(--bg-main); color: var(--text-dark);
            font-size: 0.92rem; margin-bottom: 16px; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: #fff; }

        .btn-primary {
            width: 100%; background: var(--primary); color: #ffffff; border: none;
            padding: 13px; border-radius: var(--radius-sm); font-size: 0.92rem; font-weight: 700;
            cursor: pointer; transition: all var(--transition-fast); margin-bottom: 16px;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .resend-btn {
            background: none; border: none; color: var(--primary); font-size: 0.85rem;
            font-weight: 700; cursor: pointer; text-decoration: underline; font-family: inherit;
        }
        .back-link { margin-top: 16px; font-size: 0.85rem; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>
        <h2 class="title">Reset Your Password</h2>
        <p class="desc">Enter the 6-digit code sent to <strong style="color:var(--text-dark);">{{ email }}</strong> and choose a new password.</p>

        {% if messages %}
            {% for message in messages %}
            <div class="message-banner {% if message.tags == 'success' %}success{% else %}error{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" id="reset-form">
            {% csrf_token %}
            <input type="hidden" name="code" id="full-code-input">
            <div class="code-input-group">
                <input type="text" maxlength="1" class="code-digit-input" data-index="0" inputmode="numeric" autofocus>
                <input type="text" maxlength="1" class="code-digit-input" data-index="1" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit-input" data-index="2" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit-input" data-index="3" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit-input" data-index="4" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit-input" data-index="5" inputmode="numeric">
            </div>

            <label class="form-label" for="new-pass">New Password</label>
            <input type="password" name="new_password" id="new-pass" class="form-input" placeholder="Min. 8 characters" required>

            <label class="form-label" for="confirm-pass">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm-pass" class="form-input" placeholder="Re-enter new password" required>

            <button type="submit" class="btn-primary">Reset Password</button>
        </form>

        <form method="post" action="{% url 'resend_reset_code' %}">
            {% csrf_token %}
            <button type="submit" class="resend-btn">Resend code</button>
        </form>

        <div class="back-link">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>

    <script>
        const digitInputs = document.querySelectorAll('.code-digit-input');
        const fullCodeInput = document.getElementById('full-code-input');
        const form = document.getElementById('reset-form');

        digitInputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && index < digitInputs.length - 1) {
                    digitInputs[index + 1].focus();
                }
                updateFullCode();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    digitInputs[index - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                pasted.split('').forEach((char, i) => {
                    if (digitInputs[i]) digitInputs[i].value = char;
                });
                updateFullCode();
                const nextEmpty = Array.from(digitInputs).find(i => !i.value);
                if (nextEmpty) nextEmpty.focus();
            });
        });

        function updateFullCode() {
            fullCodeInput.value = Array.from(digitInputs).map(i => i.value).join('');
        }

        form.addEventListener('submit', updateFullCode);
    </script>
</body>
</html>
