{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Com Orbit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInDown 1s ease forwards;
        }

        .orbit-logo {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 20px;
        }

        .planet {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }

        .ring {
            width: 120px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #f093fb;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #f093fb;
            animation: orbit 2s linear infinite;
            transform-origin: 0 60px;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand-name span {
            color: #667eea;
        }

        .tagline {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .loader {
            margin-top: 50px;
            display: flex;
            gap: 8px;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; background: #764ba2; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; background: #f093fb; }

        @keyframes orbit {
            from { transform: translateX(-50%) rotate(0deg); transform-origin: 0 60px; }
            to   { transform: translateX(-50%) rotate(360deg); transform-origin: 0 60px; }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40%            { transform: scale(1.2); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="orbit-logo">
            <div class="ring"></div>
            <div class="planet"></div>
            <div class="dot"></div>
        </div>
        <div class="brand-name">E-Com <span>Orbit</span></div>
        <div class="tagline">Social Commerce Ecosystem</div>
    </div>
    <div class="loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
    </div>
</body>
</html>
